    <script>
        (function() {
            const legendItems = [{"name": "Koordinat ALKI I", "type": "line", "color": "#0066cc"}, {"name": "Koordinat ALKI II", "type": "line", "color": "#9933cc"}, {"name": "Koordinat ALKI IIIA", "type": "line", "color": "green"}, {"name": "Estimasi Batas Simpangan ALKI I", "type": "buffer", "color": "#0066cc"}, {"name": "Estimasi Batas Simpangan ALKI II", "type": "buffer", "color": "#9933cc"}, {"name": "Estimasi Batas Simpangan ALKI IIIA", "type": "buffer", "color": "green"}, {"name": "Lokasi Penemuan UUV", "type": "marker", "color": "orange"}, {"name": "Estimasi Jangkauan UUV", "type": "circle", "color": "orange"}, {"name": "Batas Laut Teritorial Indonesia", "type": "dashed_line", "color": "#000000"}];
            const container = document.getElementById('legend-items-container');
            const header = document.getElementById('legend-header');
            const content = document.getElementById('legend-content');
            const toggleIcon = document.getElementById('legend-toggle-icon');
            
            // Toggle functionality
            header.addEventListener('click', function() {
                if (content.style.display === 'none') {
                    content.style.display = 'block';
                    toggleIcon.innerHTML = '▼';
                } else {
                    content.style.display = 'none';
                    toggleIcon.innerHTML = '▶';
                }
            });

            // Function to create visual representation based on type
            function createVisual(item) {
                const baseStyle = `
                    margin: 6px 0;
                    cursor: pointer;
                    padding: 2px;
                    border-radius: 3px;
                    transition: all 0.2s;
                    user-select: none;
                    display: flex;
                    align-items: center;
                `;
                
                let visualHtml = '';
                switch(item.type) {
                    case 'buffer':
                        visualHtml = `
                            <span style="
                                display: inline-block;
                                width: 16px;
                                height: 16px;
                                background-color: ${item.color};
                                opacity: 0.5;
                                border: 1px solid ${item.color};
                                margin-right: 8px;
                                border-radius: 2px;
                                flex-shrink: 0;
                            "></span>
                        `;
                        break;
                    case 'line':
                        visualHtml = `
                            <svg style="margin-right: 8px; flex-shrink: 0;" width="20" height="14">
                                <line x1="0" y1="7" x2="20" y2="7" stroke="${item.color}" stroke-width="3"/>
                                <circle cx="10" cy="7" r="3" fill="white" stroke="${item.color}" stroke-width="1.5"/>
                            </svg>
                        `;
                        break;
                    case 'dashed_line':
                        visualHtml = `
                            <svg style="margin-right: 8px; flex-shrink: 0;" width="20" height="14">
                                <line x1="0" y1="7" x2="20" y2="7" stroke="${item.color}" stroke-width="2" stroke-dasharray="4,4"/>
                            </svg>
                        `;
                        break;
                    case 'circle':
                        visualHtml = `
                            <span style="
                                display: inline-block;
                                width: 14px;
                                height: 14px;
                                background-color: rgba(255, 165, 0, 0.3);
                                border: 1px dashed ${item.color};
                                border-radius: 50%;
                                margin-right: 8px;
                                flex-shrink: 0;
                            "></span>
                        `;
                        break;
                    case 'marker':
                        visualHtml = `
                            <span style="
                                display: inline-block;
                                width: 14px;
                                height: 14px;
                                background-color: ${item.color};
                                border: 2px solid darkred;
                                border-radius: 50%;
                                margin-right: 2px;
                                flex-shrink: 0;
                            "></span>
                            <span style="
                                display: inline-block;
                                width: 14px;
                                height: 14px;
                                background-color: red;
                                border: 2px solid darkred;
                                border-radius: 50%;
                                margin-right: 8px;
                                flex-shrink: 0;
                            "></span>
                        `;
                        break;
                }
                
                return `
                    <div class="legend-item" title="Klik untuk toggle" style="${baseStyle}">
                        ${visualHtml}
                        <span style="line-height: 1.2;">${item.name}</span>
                    </div>
                `;
            }
            
            // Render all legend items
            legendItems.forEach((item, index) => {
                const itemHtml = createVisual(item);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = itemHtml;
                const itemElement = tempDiv.querySelector('.legend-item');
                container.appendChild(itemElement);
                
                // Add event listeners
                itemElement.addEventListener('mouseover', function() {
                    this.style.backgroundColor = '#f0f0f0';
                });
                
                itemElement.addEventListener('mouseout', function() {
                    this.style.backgroundColor = 'transparent';
                });
                
                itemElement.addEventListener('click', function() {
                    const layerName = item.name;
                    const layerControl = document.querySelector('.leaflet-control-layers');
                    if (layerControl) {
                        const labels = layerControl.querySelectorAll('label');
                        for (let label of labels) {
                            if (label.textContent.trim().includes(layerName)) {
                                const checkbox = label.querySelector('input');
                                if (checkbox) {
                                    checkbox.click();
                                    const opacity = parseFloat(itemElement.style.opacity) || 1;
                                    itemElement.style.opacity = opacity < 1 ? '1' : '0.45';
                                }
                                break;
                            }
                        }
                    }
                });
            });
        })();
    </script>
